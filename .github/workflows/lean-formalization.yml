name: Lean formalization

on:
  push:
    paths:
      - "formalization/lean/**"
      - "formalization/FORMALIZATION_STATUS.md"
      - ".github/workflows/lean-formalization.yml"
  pull_request:
    paths:
      - "formalization/lean/**"
      - "formalization/FORMALIZATION_STATUS.md"
      - ".github/workflows/lean-formalization.yml"
  workflow_dispatch:

jobs:
  lake-build:
    name: lake build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formalization/lean
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install elan
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean toolchain
        run: lean --version

      - name: Fetch mathlib cache
        run: lake exe cache get

      - name: Build formalization
        run: lake build
